version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      typescript-tooling:
        patterns:
          - 'typescript'
          - 'eslint*'
          - '@typescript-eslint/*'
          - 'prettier'
      turbo:
        patterns:
          - 'turbo'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
