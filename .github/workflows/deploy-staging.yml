name: Deploy → staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

# OIDC-only auth — no long-lived AWS keys in the repo.
permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # ---- Cloud auth via OIDC. Replace ARN/role with the staging deployer role. ----
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.STAGING_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker images
        env:
          ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Real Dockerfiles land in T-008. Until then this is a guarded no-op.
          if [ -f infra/docker/api.Dockerfile ]; then
            docker build -f infra/docker/api.Dockerfile \
              -t "$ECR_REGISTRY/a11y-api:$IMAGE_TAG" \
              -t "$ECR_REGISTRY/a11y-api:staging" .
            docker push "$ECR_REGISTRY/a11y-api:$IMAGE_TAG"
            docker push "$ECR_REGISTRY/a11y-api:staging"
          else
            echo "::notice::Dockerfiles not yet present — skipping image push (lands in T-008)"
          fi

      - name: Helm deploy
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -d infra/helm/a11y ]; then
            aws eks update-kubeconfig --name "${{ vars.STAGING_CLUSTER }}" \
              --region "${{ vars.AWS_REGION }}"
            helm upgrade --install a11y infra/helm/a11y \
              -n a11y-staging --create-namespace \
              -f infra/helm/a11y/values.staging.yaml \
              --set image.tag="$IMAGE_TAG" \
              --wait --timeout 10m
          else
            echo "::notice::Helm chart not yet present — skipping deploy (lands in T-008)"
          fi

      - name: Smoke test
        run: |
          if [ -n "${{ vars.STAGING_URL }}" ]; then
            curl -fsS --retry 5 --retry-delay 5 "${{ vars.STAGING_URL }}/health" || \
              { echo "Staging /health failed after deploy"; exit 1; }
          fi
