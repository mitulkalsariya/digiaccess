{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "a11y.fullname" . }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts: ["{{ .Values.ingress.host }}"]
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "a11y.fullname" . }}-api
                port: { number: 80 }
          {{- if .Values.dashboard.enabled }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "a11y.fullname" . }}-dashboard
                port: { number: 80 }
          {{- end }}
{{- end }}
