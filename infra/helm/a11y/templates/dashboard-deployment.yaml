{{- if .Values.dashboard.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "a11y.fullname" . }}-dashboard
  labels: {{- include "a11y.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      {{- include "a11y.selectorLabels" . | nindent 6 }}
      component: dashboard
  template:
    metadata:
      labels:
        {{- include "a11y.selectorLabels" . | nindent 8 }}
        component: dashboard
    spec:
      serviceAccountName: {{ include "a11y.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          ports:
            - containerPort: {{ .Values.dashboard.port }}
              name: http
          livenessProbe: { httpGet: { path: /, port: http }, initialDelaySeconds: 10 }
          readinessProbe: { httpGet: { path: /, port: http }, initialDelaySeconds: 5 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "a11y.fullname" . }}-dashboard
spec:
  type: ClusterIP
  ports: [{ port: 80, targetPort: http, name: http }]
  selector:
    {{- include "a11y.selectorLabels" . | nindent 4 }}
    component: dashboard
{{- end }}
