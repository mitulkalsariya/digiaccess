{{- if .Values.namespace.create }}
# S-16: PSS at "restricted" tier (no privileged, no host paths/network/pid,
# capabilities ALL must be dropped, runAsNonRoot enforced). Pod-level
# securityContext on each Deployment already satisfies this; the label here
# makes Kubernetes block any future regression.
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace.name }}
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
{{- end }}
