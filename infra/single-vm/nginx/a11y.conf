# Nginx reverse proxy: dashboard at /, API under /api, Excel/PDF at /export.
# Drop into /etc/nginx/sites-available/ and symlink to sites-enabled/.
# Replace REPLACE_DOMAIN with your actual hostname before `nginx -s reload`.
# certbot will rewrite the listen blocks for TLS the first time you run it.

# Hide nginx version
server_tokens off;

# Modest tuning for an internal tool.
client_max_body_size 5m;
proxy_read_timeout 60s;
proxy_send_timeout 60s;

# Cap reqs/sec at the proxy as well, in case the API rate limit is bypassed
# during a misconfigured deploy. Per-IP, with a small burst.
limit_req_zone $binary_remote_addr zone=a11y_global:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name REPLACE_DOMAIN;

    # certbot --nginx writes the cert paths after first run; redirect-to-https
    # below also gets injected automatically. Until then, http stays open for
    # the http-01 challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name REPLACE_DOMAIN;

    # certbot fills these in. Until then, point at snakeoil so nginx still
    # starts during bootstrap.
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # CSP — strict for the dashboard. Loosen if you add inline scripts.
    add_header Content-Security-Policy "default-src 'self'; \
        script-src 'self' 'unsafe-inline' 'unsafe-eval'; \
        style-src 'self' 'unsafe-inline'; \
        img-src 'self' data: blob:; \
        connect-src 'self'; \
        frame-ancestors 'none'; \
        form-action 'self'; \
        base-uri 'self';" always;

    limit_req zone=a11y_global burst=60 nodelay;
    limit_req_status 429;

    # API
    location /api/ {
        # /api/foo → /v1/foo on upstream. Adjust to taste.
        rewrite ^/api/(.*)$ /v1/$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Auth flow uses /auth/* directly (matches the API routes; no rewrite)
    location /auth/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health checks (uptime monitor / load balancer)
    location = /health      { proxy_pass http://127.0.0.1:3001/health; }
    location = /health/ready { proxy_pass http://127.0.0.1:3001/health/ready; }

    # Dashboard (Next.js — everything else)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
